<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 拼豆图纸生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        
        .offline-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        
        .offline-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        
        .upload-text {
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            margin-top: 16px;
            display: none;
        }
        
        .preview-container.show {
            display: block;
        }
        
        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .control-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .control-value {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
        }
        
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .radio-option {
            position: relative;
        }
        
        .radio-option input {
            position: absolute;
            opacity: 0;
        }
        
        .radio-option label {
            display: block;
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .radio-option input:checked + label {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .radio-option label:hover {
            border-color: var(--primary);
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-card {
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .pattern-preview {
            background: white;
            border-radius: 12px;
            padding: 16px;
            overflow: auto;
            max-height: 400px;
        }
        
        #patternCanvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }
        
        .materials-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        
        .materials-table th,
        .materials-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .materials-table th {
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .color-swatch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .download-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .processing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .processing-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .processing-text {
            margin-top: 20px;
            font-size: 1.1rem;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>

                                <label for="g15">15×15 (小)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gridSize" id="g29" value="29" checked>
                                <label for="g29">29×29 (中)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gridSize" id="g58" value="58">
                                <label for="g58">58×58 (大)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gridSize" id="g90" value="90">
                                <label for="g90">90×90 (特大)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gridSize" id="g120" value="120">
                                <label for="g120">120×120 (超大)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="gridSize" id="g150" value="150">
                                <label for="g150">150×150 (极限)</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <span class="control-label">背景颜色</span>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="bgColor" id="bgWhite" value="#FFFFFF" checked>
                                <label for="bgWhite">白色</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="bgColor" id="bgBlack" value="#000000">
                                <label for="bgBlack">黑色</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="bgColor" id="bgGray" value="#808080">
                                <label for="bgGray">灰色</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="buttons">
                        <button class="btn btn-primary" id="generateBtn" disabled>
                            ✨ 生成图纸
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card result-card" id="resultCard">
            <div class="card-title">📊 预览结果</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statBrand">Perler</div>
                    <div class="stat-label">品牌</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statGrid">29×29</div>
                    <div class="stat-label">网格尺寸</div>

                <div class="stat-item">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总拼豆数</div>
                </div>
            </div>
            
            <div class="pattern-preview">
                <canvas id="patternCanvas"></canvas>
            </div>
            
            <div class="download-section">
                <div class="buttons">
                    <button class="btn btn-success" id="downloadPngBtn">
                        📥 下载 PNG 图纸
                    </button>
                    <button class="btn btn-primary" id="downloadListBtn">
                        📋 下载材料清单
                    </button>
                </div>
            </div>
            
            <div class="materials-list" id="materialsList"></div>
        </div>
        
        <footer>
            拼豆图纸生成器 | 完全离线运行，无需上传您的图片
        </footer>
    </div>

        // ========== Delta E 2000 颜色距离算法 ==========
        function hexToLab(hex) {
            // Convert hex to RGB
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            
            // Apply gamma correction
            r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
            g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
            b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
            
            // Convert to XYZ
            let x = (r * 0.4124564 + g * 0.3575761 + b * 0.1804375) / 0.95047;
            let y = (r * 0.2126729 + g * 0.7151522 + b * 0.0721750);
            let z = (r * 0.0193339 + g * 0.1191920 + b * 0.9503041) / 1.08883;
            
            // Apply D65 illuminant
            x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787 * x) + 16/116;
            y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787 * y) + 16/116;
            z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787 * z) + 16/116;
            
            return {
                L: (116 * y) - 16,
                a: 500 * (x - y),
                b: 200 * (y - z)
            };
        }
        
        function deltaE2000(lab1, lab2) {
            const kL = 1, kC = 1, kH = 1;
            
            const C1 = Math.sqrt(lab1.a * lab1.a + lab1.b * lab1.b);
            const C2 = Math.sqrt(lab2.a * lab2.a + lab2.b * lab2.b);
            const Cab = (C1 + C2) / 2;
            const Cab7 = Math.pow(Cab, 7);
            const G = 0.5 * (1 - Math.sqrt(Cab7 / (Cab7 + Math.pow(25, 7))));
            
            const a1p = lab1.a * (1 + G);
            const a2p = lab2.a * (1 + G);
            
            const C1p = Math.sqrt(a1p * a1p + lab1.b * lab1.b);
            const C2p = Math.sqrt(a2p * a2p + lab2.b * lab2.b);
            
            let h1p = Math.atan2(lab1.b, a1p) * 180 / Math.PI;
            if (h1p < 0) h1p += 360;
            
            let h2p = Math.atan2(lab2.b, a2p) * 180 / Math.PI;
            if (h2p < 0) h2p += 360;
            
            const dLp = lab2.L - lab1.L;
            const dCp = C2p - C1p;
            
            let dhp = h2p - h1p;
            if (dhp > 180) dhp -= 360;
            else if (dhp < -180) dhp += 360;
            
            const dHp = 2 * Math.sqrt(C1p * C2p) * Math.sin(dhp * Math.PI / 360);
            
            const Lp = (lab1.L + lab2.L) / 2;
            const Cp = (C1p + C2p) / 2;
            
            let Hp = h1p + h2p;
            if (dhp > 180) Hp += 180;
            else if (dhp < -180) Hp -= 180;
            if (Hp < 0) Hp += 360;
            else if (Hp >= 360) Hp -= 360;
            
            const T = 1 - 0.17 * Math.cos((Hp - 30) * Math.PI / 180)
                     + 0.24 * Math.cos(2 * Hp * Math.PI / 180)
                     + 0.32 * Math.cos((3 * Hp + 6) * Math.PI / 180)
                     - 0.20 * Math.cos((4 * Hp - 63) * Math.PI / 180);
            
            const Lp50 = Math.pow(Lp - 50, 2);
            const SL = 1 + (0.015 * Lp50) / Math.sqrt(20 + Lp50);
            const SC = 1 + 0.045 * Cp;
            const SH = 1 + 0.015 * Cp * T;
            
            const dTheta = 30 * Math.exp(-Math.pow((Hp - 275) / 25, 2));
            const Cp7 = Math.pow(Cp, 7);
            const RC = 2 * Math.sqrt(Cp7 / (Cp7 + Math.pow(25, 7)));
            const RT = -RC * Math.sin(2 * dTheta * Math.PI / 180);
            
            return Math.sqrt(
                Math.pow(dLp / (kL * SL), 2) +
                Math.pow(dCp / (kC * SC), 2) +
                Math.pow(dHp / (kH * SH), 2) +
                RT * (dCp / (kC * SC)) * (dHp / (kH * SH))
            );
        }
        
        // ========== 颜色匹配 ==========
        function findClosestColor(hex, colorArray) {
            const lab1 = hexToLab(hex);
            let minDelta = Infinity;
            let closestColor = colorArray[0];
            
            for (const color of colorArray) {
                const lab2 = hexToLab(color.hex);
                const delta = deltaE2000(lab1, lab2);
                if (delta < minDelta) {
                    minDelta = delta;
                    closestColor = color;
                }
            }
            
            return closestColor;
        }

        // ========== 处理文件 ==========
        function handleFile(file) {
            if (file.size > 50 * 1024 * 1024) {
                alert('文件太大，请选择小于 50MB 的图片');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    previewImg.src = e.target.result;
                    previewContainer.classList.add('show');
                    generateBtn.disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // ========== 生成图纸 ==========
        async function generatePattern() {
            if (!currentImage) return;
            
            processingOverlay.classList.add('show');
            
            // 使用 requestAnimationFrame 让 UI 有时间更新
            await new Promise(resolve => requestAnimationFrame(resolve));
            
            try {
                const gridSize = selectedGridSize;
                const colors = BEAD_COLORS[selectedBrand];
                const bgColor = selectedBgColor;
                
                // 创建临时 canvas 来处理图像
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                
                // 计算网格尺寸
                const aspectRatio = currentImage.height / currentImage.width;
                const gridWidth = gridSize;
                const gridHeight = Math.round(gridSize * aspectRatio);
                
                tempCanvas.width = gridWidth;
                tempCanvas.height = gridHeight;
                
                // 绘制并缩放图像
                tempCtx.drawImage(currentImage, 0, 0, gridWidth, gridHeight);
                
                // 获取图像数据
                const imageData = tempCtx.getImageData(0, 0, gridWidth, gridHeight);
                const pixels = imageData.data;
                
                // 创建图案数据
                patternData = {
                    width: gridWidth,
                    height: gridHeight,
                    grid: [],
                    colors: {},
                    bgColor: bgColor,
                    brand: selectedBrand
                };
                
                // 处理每个像素
                for (let y = 0; y < gridHeight; y++) {
                    patternData.grid[y] = [];
                    for (let x = 0; x < gridWidth; x++) {
                        const i = (y * gridWidth + x) * 4;
                        const r = pixels[i];
                        const g = pixels[i + 1];
                        const b = pixels[i + 2];
                        
                        const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                        const closestColor = findClosestColor(hex, colors);
                        
                        patternData.grid[y][x] = closestColor;
                        
                        // 统计颜色
                        if (!patternData.colors[closestColor.id]) {
                            patternData.colors[closestColor.id] = {
                                ...closestColor,
                                count: 0
                            };
                        }
                        patternData.colors[closestColor.id].count++;
                    }
                }
                
                // 绘制预览
                await drawPattern();
                
                // 更新统计
                updateStats();
                
                // 显示结果
                resultCard.classList.add('show');
                
            } catch (error) {
                console.error('生成图纸失败:', error);
                alert('生成图纸时发生错误，请重试');
            } finally {
                processingOverlay.classList.remove('show');
            }
        }
        
        // ========== 绘制图纸 ==========
        async function drawPattern() {
            const cellSize = 12; // 每个格子的像素大小
            const canvas = patternCanvas;
            const ctx = canvas.getContext('2d');
            
            canvas.width = patternData.width * cellSize;
            canvas.height = patternData.height * cellSize;
            
            // 绘制每个格子
            for (let y = 0; y < patternData.height; y++) {
                for (let x = 0; x < patternData.width; x++) {
                    const color = patternData.grid[y][x];
                    
                    // 绘制圆形拼豆
                    ctx.fillStyle = color.hex;
                    ctx.beginPath();
                    const cx = x * cellSize + cellSize / 2;
                    const cy = y * cellSize + cellSize / 2;
                    const r = cellSize / 2 - 1;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 添加边框
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
            
            // 绘制网格线
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 0.5;
            
            for (let x = 0; x <= patternData.width; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y <= patternData.height; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(canvas.width, y * cellSize);
                ctx.stroke();
            }
        }

                    <thead>
                        <tr>
                            <th>颜色</th>
                            <th>色号</th>
                            <th>数量</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedColors.forEach(color => {
                html += `
                    <tr>
                        <td>
                            <div class="color-swatch">
                                <span class="color-dot" style="background: ${color.hex}"></span>
                                ${color.name}
                            </div>
                        </td>
                        <td>${color.id}</td>
                        <td>${color.count}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            materialsList.innerHTML = html;
        }
        
        // ========== 下载 PNG ==========
        function downloadPng() {
            if (!patternData) return;
            
            const cellSize = 20; // 高清版本的格子大小
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = patternData.width * cellSize;
            canvas.height = patternData.height * cellSize;
            
            // 绘制背景
            ctx.fillStyle = patternData.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制每个格子
            for (let y = 0; y < patternData.height; y++) {
                for (let x = 0; x < patternData.width; x++) {
                    const color = patternData.grid[y][x];
                    
                    ctx.fillStyle = color.hex;
                    ctx.beginPath();
                    const cx = x * cellSize + cellSize / 2;
                    const cy = y * cellSize + cellSize / 2;
                    const r = cellSize / 2 - 1;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 添加边框
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 绘制色号
                    ctx.fillStyle = isLightColor(color.hex) ? '#000' : '#FFF';
                    ctx.font = `bold ${Math.max(8, cellSize / 4)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(color.id.replace(/^[PHA]\d/, ''), cx, cy);
                }
            }
            
            // 绘制网格线
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x <= patternData.width; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y <= patternData.height; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(canvas.width, y * cellSize);
                ctx.stroke();
            }
            
            // 下载
            const link = document.createElement('a');
            link.download = `拼豆图纸_${patternData.width}x${patternData.height}_${patternData.brand}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // ========== 判断是否为浅色 ==========
        function isLightColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5;
        }
        
        // ========== 下载材料清单 ==========
        function downloadMaterialsList() {
            if (!patternData) return;
            
            const sortedColors = Object.values(patternData.colors).sort((a, b) => b.count - a.count);
            const total = sortedColors.reduce((sum, c) => sum + c.count, 0);
            
            let content = '拼豆材料清单\n';
            content += '================\n\n';
            content += `品牌: ${patternData.brand}\n`;
            content += `尺寸: ${patternData.width}×${patternData.height}\n`;
            content += `总数量: ${total} 颗\n`;
            content += `使用颜色: ${sortedColors.length} 种\n\n`;
            content += '----------------\n';
            content += '材料列表\n';
            content += '----------------\n\n';
            content += '色号\t颜色\t数量\n';
            content += '----\t----\t----\n';
            
            sortedColors.forEach(color => {
                content += `${color.id}\t${color.name}\t${color.count}\n`;
            });
            
            content += '\n----------------\n';
            content += `总计: ${total} 颗\n`;
            
            // 创建并下载文件
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.download = `材料清单_${patternData.width}x${patternData.height}_${patternData.brand}.txt`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        }
    </script>
</body>
</html>
